<div class="content d-flex w-100 h-100">
    <app-sidebar *ngIf="!aiAssistantOpen" [connections]="connections" [activeConnection]="activeConnection"
        [dbSchemas]="databasesSchemasActiveConnections" [selectedSchemaDB]="selectedSchemaDB"
        (sidebarStatusChange)="onSidebarStatusChange($event)" (dbInfoRequested)="onDbInfoRequested($event)"
        (selectedSchemaChanged)="onSelectedSchemaChanged($event)"
        (settingsRequested)="onSettingsRequested()" (sqlScriptRequested)="onSqlScriptRequested($event)"
        (contextConnectionRequested)="onContextConnectionRequested($event)"></app-sidebar>
    <app-ai-assistant-panel *ngIf="aiAssistantOpen" [selectedSchemaDB]="selectedSchemaDB"
        [dbSchemasData]="dbSchemasData" [tabInfo]="tabInfo" (close)="closeAiAssistant()"
        (settingsRequested)="onAiSettingsRequested()"></app-ai-assistant-panel>
    <div class="main-area">
        <div class="tabs pt-3 px-3">
            <app-tabs (tabSelected)="onTabSelected($event)" (tabClosed)="onTabClosed($event)"
                (assistantRequested)="openAiAssistant()"></app-tabs>
        </div>
        <div class="organize">
            <div class="d-flex flex-column w-100 h-100 user-content">
                <h3 *ngIf="firstMessage" class="subtitle-min text-center py-4">{{ t('workspace.firstMessage') }}</h3>
                <app-db-info *ngFor="let tab of openSchemaTabs; trackBy: trackTabByIdentity"
                    [hidden]="!isActiveContentTab(tab)" [data]="tab.info?.dbInfo" [tabInfo]="tab"
                    (moreInfo)="openMoreInfo($event)"></app-db-info>
                <app-table-info *ngFor="let tab of openTableTabs; trackBy: trackTabByIdentity"
                    [hidden]="!isActiveContentTab(tab)" [data]="tab.dbInfo || tab.info?.info"
                    [elementName]="tab.info?.name || tab.name" [tabInfo]="tab"></app-table-info>
                <app-procedure-info *ngFor="let tab of openProcedureTabs; trackBy: trackTabByIdentity"
                    [hidden]="!isActiveContentTab(tab)" [data]="tab.dbInfo || tab.info?.info"
                    [elementName]="tab.info?.name || tab.name" [tabInfo]="tab"
                    (editRequested)="onProcedureEditRequested($event)"></app-procedure-info>
                <app-settings *ngIf="settingsInitialized" [hidden]="!settingsOpen"
                    [initialTab]="tabInfo?.info?.activeTab || null"
                    (aiSettingsSaved)="onAiSettingsSaved()"></app-settings>
                <app-query-assistant *ngIf="queryAssistantOpen" [tabInfo]="tabInfo"
                    (selectBuilderRequested)="onSelectBuilderRequested($event)"></app-query-assistant>
                <app-select-builder *ngIf="selectBuilderOpen" [tabInfo]="tabInfo"
                    (queryRequested)="onBuilderQueryRequested($event)"></app-select-builder>
                <app-query-version-compare *ngIf="queryCompareOpen" [tabInfo]="tabInfo"
                    (editRequested)="onCompareEditRequested($event)"
                    (restoreRequested)="onCompareRestoreRequested($event)"></app-query-version-compare>

                <app-code-editor *ngFor="let tab of openTabs; trackBy: trackTabByIdentity"
                    [hidden]="!isActiveSqlTab(tab)" [active]="isActiveSqlTab(tab)" [sqlContent]="tab.info?.sql || ''"
                    [widthTable]="widthTable" [tabInfo]="tab" (sqlContentChange)="onSqlContentChange($event, tab)"
                    (savedName)="onSavedQuery($event, tab)" (savedQuery)="onExistingSavedQuery($event)"
                    (objectInfoRequested)="onSqlObjectInfoRequested($event)">
                </app-code-editor>
            </div>
        </div>
    </div>
</div>

<app-toast></app-toast>
