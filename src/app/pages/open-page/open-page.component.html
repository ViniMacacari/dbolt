<main class="home-page">
    <section class="home-shell">
        <header class="home-header">
            <div class="title-block">
                <h1>DBolt Database Manager</h1>
                <p>Choose your database</p>
            </div>

            <div class="header-actions">
                <div class="view-toggle gap-1" aria-label="View mode">
                    <button type="button" [class.active]="viewMode === 'focus'" (click)="setViewMode('focus')">
                        Focus
                    </button>
                    <button type="button" [class.active]="viewMode === 'matrix'" (click)="setViewMode('matrix')">
                        Matrix
                    </button>
                </div>

                <button type="button" class="new-button" (click)="openModal()">
                    <img src="icons/add.png" height="14px" width="14px">
                    New
                </button>
            </div>
        </header>

        <section class="focus-layout" *ngIf="viewMode === 'focus' && connections.length > 0">
            <aside class="connection-rail">
                <button type="button" class="rail-item" *ngFor="let connection of connections; trackBy: trackConnectionById"
                    [class.active]="selectedConnection?.id === connection.id" (click)="selectConnection(connection)"
                    (dblclick)="onCardClick(connection.id)">
                    <img src="db-logo/{{ connection.database }}.png" height="30px" width="30px">
                    <span>
                        <strong>{{ connection.name }}</strong>
                        <small>{{ connection.database }} {{ connection.version }}</small>
                    </span>
                </button>
            </aside>

            <article class="connection-stage" *ngIf="selectedConnection">
                <div class="stage-actions">
                    <button type="button" title="Edit connection" (click)="editConnection(selectedConnection, $event)">
                        <img src="icons/edit.png" height="15px" width="15px">
                    </button>
                    <button type="button" title="Delete connection"
                        (click)="deleteConnection(selectedConnection.id, $event)">
                        <img src="icons/delete.png" height="15px" width="15px">
                    </button>
                </div>

                <div class="stage-logo">
                    <img src="db-logo/{{ selectedConnection.database }}.png" height="96px" width="96px">
                </div>

                <div class="stage-copy">
                    <p>{{ selectedConnection.database }} {{ selectedConnection.version }}</p>
                    <h2>{{ selectedConnection.name }}</h2>
                    <span>{{ selectedConnection.host }}:{{ selectedConnection.port }}</span>
                </div>

                <dl class="stage-meta">
                    <div>
                        <dt>User</dt>
                        <dd>{{ selectedConnection.user }}</dd>
                    </div>
                    <div>
                        <dt>Default target</dt>
                        <dd>{{ selectedTarget }}</dd>
                    </div>
                </dl>

                <button type="button" class="open-button" (click)="openSelectedConnection()">
                    Open workspace
                </button>
            </article>
        </section>

        <section class="matrix-layout" *ngIf="viewMode === 'matrix' && connections.length > 0">
            <button type="button" class="matrix-item" *ngFor="let connection of connections; trackBy: trackConnectionById"
                (click)="onCardClick(connection.id)">
                <span class="matrix-actions">
                    <img src="icons/edit.png" title="Edit connection" height="14px" width="14px"
                        (click)="editConnection(connection, $event)">
                    <img src="icons/delete.png" title="Delete connection" height="14px" width="14px"
                        (click)="deleteConnection(connection.id, $event)">
                </span>
                <img src="db-logo/{{ connection.database }}.png" height="54px" width="54px">
                <strong>{{ connection.name }}</strong>
                <small>{{ connection.host }}:{{ connection.port }}</small>
            </button>
        </section>

        <section class="empty-state" *ngIf="connections.length === 0">
            <span class="plus-mark"></span>
            <h2>No saved connections</h2>
            <button type="button" class="open-button" (click)="openModal()">New connection</button>
        </section>
    </section>
</main>

<app-connection *ngIf="isModalOpen" [connection]="editingConnection" (close)="closeModal()"></app-connection>
<app-toast #toast></app-toast>
