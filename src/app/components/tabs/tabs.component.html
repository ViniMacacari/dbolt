<div class="content d-flex gap-2">
    <button type="button" class="add assistant" (click)="openAssistant($event)" [title]="t('aiAssistant.title')">
        <img src="icons/ai.png" height="17px" alt="IA">
    </button>

    <div class="add" (click)="toggleDropdown()">
        <img src="icons/add.png" height="17px">

        <div class="dropdown" *ngIf="dropdownVisible">
            <ul>
                <li class="text-min" (click)="newTab('sql', { sql: '' })">
                    <img src="icons/code.png" height="10px">
                    {{ t('tabs.newQuery') }}
                </li>
                <li class="text-min" (click)="loadTab()">
                    <img src="icons/folder-code.png" height="10px">
                    {{ t('tabs.loadQuery') }}
                </li>
                <li class="text-min" (click)="openQueryAssistantTab()">
                    <img src="icons/code-block.png" height="10px">
                    {{ t('tabs.queryAssistant') }}
                </li>
            </ul>
        </div>
    </div>
    <div class="wrap-tables">
        <div class="tabs" #tabsContainer>
            <div class="tab gap-3" *ngFor="let tab of tabs; let i = index" [class.active]="i === activeTab"
                (click)="selectTab(i)">
                <img class="tab-icon" [src]="getTabIcon(tab)" height="15px" />
                <div class="text" title="{{ tab.name }}">
                    <p class="text-min">{{ tab.name }}</p>
                </div>
                <img class="tab-close" src="icons/close.png" height="15px" (click)="closeTab(i, $event, tab)" />
            </div>
        </div>
    </div>
</div>

<app-load-query *ngIf="showLoadQuery" (open)="onOpenLoadQuery($event)" (compare)="openQueryVersionCompareTab($event)"
    (close)="onCloseLoadQuery($event)"></app-load-query>
<app-yes-no-modal *ngIf="showYNModal" [title]="t('tabs.unsavedChangesTitle')"
    [message]="t('tabs.unsavedChangesMessage')" (closeAction)="showYNModal = false"
    (continueAction)="confirmTabClose()"></app-yes-no-modal>
