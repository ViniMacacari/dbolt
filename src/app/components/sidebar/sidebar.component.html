<div class="sidebar-shell" [class.sidebar-hidden]="!sidebarVisible" [class.sidebar-resizing]="resizingSidebar"
    [style.width.px]="sidebarVisible ? sidebarWidth : sidebarCollapsedWidth">
    <div class="sidebar-viewport">
    <aside class="sidebar" [style.width.px]="sidebarWidth" [attr.aria-hidden]="!sidebarVisible"
        [attr.inert]="!sidebarVisible ? '' : null">
    <div class="sidebar-actions my-2">
        <button type="button" (click)="hideSidebar()" class="sidebar-action-button menu-button"
            [title]="t('sidebar.hide')" [attr.aria-label]="t('sidebar.hide')">
            <img src="icons/menu.png" height="17px" width="17px" class="toogle-img" alt="">
        </button>
        <button type="button" (click)="goToHome()" class="sidebar-action-button home-button">
            <img src="icons/home.png" height="17px" width="17px" [title]="t('sidebar.home')">
        </button>
        <button type="button" (click)="openSettings()" class="sidebar-action-button settings-button">
            <img src="icons/settings.png" height="17px" width="17px" [title]="t('sidebar.settings')">
        </button>
    </div>
    <div class="sidebar-selection-spacer"></div>

    <p class="selected-title">{{ t('sidebar.currentlySelected') }}</p>
    <button type="button" class="sgbd" (click)="toggleQuickSelector('connection', $event)">
        <img src="db-logo/{{ selectedSchemaDB?.sgbd }}.png" height="15px" width="15px">
        <p class="text-min w-100">{{ selectedSchemaDB?.sgbd }} ({{ selectedSchemaDB?.name }})</p>
    </button>
    <button type="button" class="database" (click)="toggleQuickSelector('database', $event)"
        (contextmenu)="openSelectedDatabaseContextMenu($event)">
        <img src="icons/database.png" height="15px" width="15px">
        <p class="text-min w-100">{{ selectedSchemaDB?.database }}</p>
    </button>
    <button type="button" class="schema" (click)="toggleQuickSelector('schema', $event)"
        (contextmenu)="openSelectedSchemaContextMenu($event)">
        <img src="icons/schema.png" height="15px" width="15px">
        <p class="text-min w-100">{{ selectedSchemaDB?.schema }}</p>
    </button>

    <div class="separator my-3"></div>

    <div class="connections">
        <div *ngFor="let connection of connections" class="connection"
            [class.connection-expanded]="expandedConnections.has(connection.id)"
            [class.connection-selected]="isSelectedConnection(connection)"
            [class.connection-loading]="loadingConnections.has(connection.id)">
            <button type="button" class="connection-edit-button" [title]="t('sidebar.editConnection')"
                (click)="editConnection(connection, $event)">
                <img src="icons/edit.png" height="13px" width="13px">
            </button>
            <button type="button" class="connection-summary" (click)="toggleConnection(connection)"
                [attr.aria-expanded]="expandedConnections.has(connection.id)"
                [attr.aria-busy]="loadingConnections.has(connection.id)">
                <img class="connection-logo" src="db-logo/{{ connection.database }}.png" height="16px" width="16px">
                <span class="connection-summary-copy">
                    <strong>{{ connection.name }}</strong>
                    <small>{{ connection.host }}:{{ connection.port }}</small>
                </span>
                <span class="connection-toggle-indicator" aria-hidden="true">›</span>
            </button>

            <div class="connection-info-collapse"
                [class.connection-info-visible]="expandedConnectionContents.has(connection.id)"
                [attr.aria-hidden]="!expandedConnectionContents.has(connection.id)"
                [attr.inert]="!expandedConnectionContents.has(connection.id) ? '' : null">
                <div class="connection-info">
                    <div *ngFor="let database of getSchemasByConnection(connection); let firstDatabase = first"
                        class="d-flex flex-column">
                        <div class="separator" *ngIf="!firstDatabase"></div>
                        <div (click)="toggleDatabase(connection.id + '-' + database.database)"
                            (dblclick)="openDatabaseInfo(connection, database, $event)"
                            (contextmenu)="openDatabaseContextMenu(connection, database, $event)"
                            class="database-row d-flex align-items-center gap-2"
                            [class.selected-database]="isSelectedDatabase(connection, database)">
                            <img src="icons/database.png" height="15px" width="15px">
                            <h2 class="database-name">{{ database.database }}</h2>
                        </div>
                        <div class="schemas-collapse"
                            [class.schemas-visible]="expandedDatabases.has(connection.id + '-' + database.database)"
                            [attr.aria-hidden]="!expandedDatabases.has(connection.id + '-' + database.database)"
                            [attr.inert]="!expandedDatabases.has(connection.id + '-' + database.database) ? '' : null">
                            <div class="schemas">
                                <div *ngFor="let schema of database.schemas" (dblclick)="openSchemaDBInfo({
                            schema: schema,
                            database: database.database,
                            sgbd: connection.database,
                            version: connection.version,
                            connectionId: connection.id,
                            name: connection.name,
                            host: connection.host,
                            port: connection.port,
                            password: connection.password,
                            user: connection.user
                        }, {
                            schema: schema,
                            database: database.database,
                            sgbd: connection.database,
                            version: connection.version,
                            connectionId: connection.id,
                            name: connection.name,
                            host: connection.host,
                            port: connection.port,
                            password: connection.password,
                            user: connection.user
                        })" (click)="selectSchema({
                            schema: schema,
                            database: database.database,
                            sgbd: connection.database,
                            version: connection.version,
                            connectionId: connection.id,
                            name: connection.name,
                            host: connection.host,
                            port: connection.port,
                            password: connection.password,
                            user: connection.user
                                })" (contextmenu)="openSchemaContextMenu(connection, database, schema, $event)"
                                    class="schema-row d-flex align-items-center gap-2"
                                    [class.selected-schema]="isSelectedSchema(connection, database.database, schema)">
                                    <img src="icons/schema.png" height="10px" width="10px">
                                    <p class="text-min-gray">{{ schema }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </aside>

    <nav class="sidebar-collapsed-rail" [attr.aria-hidden]="sidebarVisible"
        [attr.inert]="sidebarVisible ? '' : null"
        [attr.aria-label]="t('sidebar.navigation')">
        <button type="button" class="collapsed-action-button" (click)="showSidebar()"
            [title]="t('sidebar.show')" [attr.aria-label]="t('sidebar.show')">
            <img src="icons/menu.png" height="17px" width="17px" alt="">
        </button>
        <button type="button" class="collapsed-action-button" (click)="goToHome()"
            [title]="t('sidebar.home')" [attr.aria-label]="t('sidebar.home')">
            <img src="icons/home.png" height="17px" width="17px" alt="">
        </button>
        <button type="button" class="collapsed-action-button" (click)="openSettings()"
            [title]="t('sidebar.settings')" [attr.aria-label]="t('sidebar.settings')">
            <img src="icons/settings.png" height="17px" width="17px" alt="">
        </button>

        <div class="collapsed-selection" *ngIf="selectedSchemaDB"
            [attr.aria-label]="t('sidebar.currentlySelected')">
            <button type="button" class="collapsed-selection-button"
                (click)="toggleQuickSelector('connection', $event)"
                [title]="t('sidebar.selectConnection') + ': ' + selectedSchemaDB.sgbd + ' (' + selectedSchemaDB.name + ')'"
                [attr.aria-label]="t('sidebar.selectConnection') + ': ' + selectedSchemaDB.sgbd + ' (' + selectedSchemaDB.name + ')'">
                <img src="db-logo/{{ selectedSchemaDB.sgbd }}.png" height="16px" width="16px" alt="">
            </button>
            <button type="button" class="collapsed-selection-button"
                (click)="toggleQuickSelector('database', $event)"
                (contextmenu)="openSelectedDatabaseContextMenu($event)"
                [title]="t('sidebar.selectDatabase') + ': ' + selectedSchemaDB.database"
                [attr.aria-label]="t('sidebar.selectDatabase') + ': ' + selectedSchemaDB.database">
                <img src="icons/database.png" height="16px" width="16px" alt="">
            </button>
            <button type="button" class="collapsed-selection-button"
                (click)="toggleQuickSelector('schema', $event)"
                (contextmenu)="openSelectedSchemaContextMenu($event)"
                [title]="t('sidebar.selectSchema') + ': ' + selectedSchemaDB.schema"
                [attr.aria-label]="t('sidebar.selectSchema') + ': ' + selectedSchemaDB.schema">
                <img src="icons/schema.png" height="14px" width="14px" alt="">
            </button>
        </div>
    </nav>
    </div>

    <button *ngIf="sidebarVisible" type="button" class="sidebar-resize-handle" role="separator" tabindex="0"
        aria-orientation="vertical" [attr.aria-label]="t('sidebar.resize')"
        [attr.aria-valuemin]="sidebarMinWidth" [attr.aria-valuemax]="sidebarMaxWidth"
        [attr.aria-valuenow]="sidebarWidth" [title]="t('sidebar.resizeHint')"
        (pointerdown)="startSidebarResize($event)" (dblclick)="toggleSidebarPreset()"
        (keydown)="onSidebarResizeKeydown($event)">
        <span></span>
    </button>
</div>

<app-connection *ngIf="isModalOpen" [connection]="editingConnection" (close)="closeModal()"></app-connection>
<app-toast #toast></app-toast>

<div class="context-menu" *ngIf="contextMenu" [style.left.px]="contextMenu.x" [style.top.px]="contextMenu.y"
    (click)="$event.stopPropagation()" (contextmenu)="$event.preventDefault()">
    <div class="context-menu-header">
        <span>{{ contextMenu.type === 'database' ? t('sidebar.context.database') : t('sidebar.context.schema') }}</span>
        <strong>{{ contextMenu.label }}</strong>
    </div>
    <button type="button" (click)="requestNewSqlScript($event)">
        <img src="icons/code.png" height="13px" width="13px">
        {{ t('sidebar.context.newSqlScript') }}
    </button>
    <button type="button" (click)="requestConnection(true, $event)">
        <img src="icons/refresh.png" height="13px" width="13px">
        {{ t('sidebar.context.invalidateReconnect') }}
    </button>
    <button type="button" (click)="requestConnection(false, $event)">
        <img src="icons/test-connection.png" height="13px" width="13px">
        {{ t('sidebar.context.connect') }}
    </button>
    <button type="button" (click)="requestContextInfo($event)">
        <img src="icons/database.png" height="13px" width="13px">
        {{ t('sidebar.context.openInformation') }}
    </button>
</div>

<div class="quick-selector-backdrop" *ngIf="quickSelectorType" (click)="closeQuickSelector()">
    <div class="quick-selector-modal" (click)="$event.stopPropagation()">
        <div class="quick-selector-header">
            <div>
                <p class="quick-selector-kicker">{{ t('sidebar.currentlySelected') }}</p>
                <h2>{{ getQuickSelectorTitle() }}</h2>
            </div>
            <button type="button" [attr.aria-label]="t('sidebar.closeSelector')" (click)="closeQuickSelector($event)">x</button>
        </div>

        <div class="quick-selector-search">
            <input type="text" [value]="quickSelectorFilter" (input)="onQuickSelectorFilter($event)"
                [placeholder]="t('sidebar.filterByName')">
        </div>

        <div class="quick-selector-body">
            <ng-container *ngIf="getFilteredQuickSelectorOptions() as quickOptions">
                <button type="button" class="quick-option"
                    *ngFor="let option of quickOptions; trackBy: trackQuickSelectorOption"
                    (click)="selectQuickOption(option, $event)">
                    <img [src]="option.icon" height="18px" width="18px">
                    <span>{{ option.label }}</span>
                    <small>{{ option.description }}</small>
                </button>

                <p class="quick-empty" *ngIf="quickOptions.length === 0">{{ t('sidebar.noOptions') }}</p>
            </ng-container>
        </div>
    </div>
</div>
