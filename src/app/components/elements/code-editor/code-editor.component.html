<div #editorShell class="code-editor-container d-flex h-100 gap-2"
    [class.results-expanded]="queryResultExpanded && queryResultOpen">
    <div class="editor-toolbar d-flex align-items-center flex-column">
        <button class="btn">
            <img (click)="runSelected()" src="icons/run.png" [title]="t('editor.runSelected')" height="15px">
        </button>
        <button class="btn">
            <img (click)="runAll()" src="icons/execute-all.png" [title]="t('editor.runAll')" height="15px">
        </button>
        <button class="btn" (click)="formatCode()">
            <img src="icons/star.png" [title]="t('editor.indentCode')" height="15px">
        </button>
        <button class="btn" (click)="saveQuery()">
            <img src="icons/save.png" [title]="t('editor.saveCode')" height="15px">
        </button>
        <button class="btn" (click)="saveAs()">
            <img src="icons/save_as.png" [title]="t('editor.saveCodeAs')" height="15px">
        </button>
    </div>
    <div #codeEditorPanel class="code-editor py-2" [class.has-results]="queryResultOpen"
        [class.results-expanded]="queryResultExpanded"
        [style.--query-result-height]="queryResultHeight + 'px'">
        <div class="editor-panel">
            <div #editorContainer class="editor"></div>
        </div>
        <div class="result-panel" *ngIf="queryResultOpen">
            <app-table-query (newValuesQuery)="newValues()" [query]="queryReponse" [resultHeight]="queryResultHeight"
                [columns]="queryColumns" [calcWidth]="widthTable" [rowLimit]="queryFetchSize" [totalRows]="maxResultLines"
                [isSelectResult]="queryResultIsSelect" [executedSql]="cacheSql" [dbContext]="tabInfo?.dbInfo"
                [isExpanded]="queryResultExpanded" [isLoading]="isLoadingQuery" [isLoadingMore]="isLoadingMore"
                [errorMessage]="queryError" [executionTimeMs]="queryExecutionTimeMs"
                (rowLimitChange)="onQueryFetchSizeChange($event)" (refreshQuery)="refreshQueryWithFetchSize()"
                (resultHeightChange)="onQueryResultHeightChange($event)"
                (toggleExpanded)="toggleQueryResultExpanded()"
                (closeResult)="closeQueryResult()"></app-table-query>
        </div>
    </div>
</div>

<app-toast></app-toast>
<app-save-query [data]="dataSave" *ngIf="isSaveAsOpen" (saved)="savedSaveAs($event)" (close)="closeSaveAs()"></app-save-query>
