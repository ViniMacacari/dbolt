<div class="code-editor-container d-flex h-100 gap-2"
    [class.results-expanded]="queryResultExpanded && queryReponse.length > 0">
    <div class="editor-toolbar d-flex align-items-center flex-column">
        <button class="btn">
            <img (click)="runSelected()" src="icons/run.png" title="Run selected code" height="15px">
        </button>
        <button class="btn">
            <img (click)="runAll()" src="icons/execute-all.png" title="Run all code" height="15px">
        </button>
        <button class="btn">
            <img src="icons/star.png" title="Indent code" height="15px">
        </button>
        <button class="btn" (click)="saveQuery()">
            <img src="icons/save.png" title="Save code" height="15px">
        </button>
        <button class="btn" (click)="saveAs()">
            <img src="icons/save_as.png" title="Save code as" height="15px">
        </button>
    </div>
    <div #codeEditorPanel class="code-editor py-2" [class.has-results]="queryReponse.length > 0"
        [class.results-expanded]="queryResultExpanded"
        [style.--query-result-height]="queryResultHeight + 'px'">
        <div class="editor-panel">
            <div #editorContainer class="editor"></div>
        </div>
        <div class="result-panel" *ngIf="queryReponse.length > 0">
            <app-table-query (newValuesQuery)="newValues()" [query]="queryReponse" [resultHeight]="queryResultHeight"
                [calcWidth]="widthTable" [rowLimit]="queryFetchSize" [totalRows]="maxResultLines"
                [isSelectResult]="maxResultLines !== null && maxResultLines !== undefined"
                [isExpanded]="queryResultExpanded"
                (rowLimitChange)="onQueryFetchSizeChange($event)" (refreshQuery)="refreshQueryWithFetchSize()"
                (resultHeightChange)="onQueryResultHeightChange($event)"
                (toggleExpanded)="toggleQueryResultExpanded()"
                (closeResult)="closeQueryResult()"></app-table-query>
        </div>
    </div>
</div>

<app-toast></app-toast>
<app-save-query [data]="dataSave" *ngIf="isSaveAsOpen" (saved)="savedSaveAs($event)" (close)="closeSaveAs()"></app-save-query>
<app-loading [message]="'Running command...'"></app-loading>
