<div #tableWrapper class="query-result-wrapper">
    <div class="result-bar">
        <div class="resize-handle" title="Resize results" (mousedown)="startResize($event)"></div>
        <div class="result-actions">
            <div class="result-title">
                <span>Results</span>
                <small *ngIf="isSelectResult && totalRows !== null">{{ totalRows }} rows</small>
            </div>

            <div class="row-limit" *ngIf="isSelectResult">
                <label for="query-row-limit">Rows</label>
                <input id="query-row-limit" type="number" min="1" step="1" [value]="rowLimit"
                    (input)="onRowLimitInput($event)" (keydown.enter)="applyRowLimit()">
                <button type="button" (click)="applyRowLimit()">Apply</button>
            </div>

            <div class="edit-actions" *ngIf="isSelectResult">
                <button type="button" class="result-icon-button" title="Edit result rows" *ngIf="!editingEnabled"
                    [disabled]="!canStartEditing()" (click)="startEditing()">
                    <img src="icons/edit.png" height="13px" width="13px">
                </button>

                <ng-container *ngIf="editingEnabled">
                    <button type="button" class="result-icon-button" title="Add row"
                        [disabled]="isApplyingEdits" (click)="addRow()">
                        <img src="icons/add.png" height="13px" width="13px">
                    </button>
                    <button type="button" class="result-icon-button" title="Apply changes"
                        [disabled]="!hasPendingChanges() || isApplyingEdits" (click)="applyPendingChanges()">
                        <img src="icons/save.png" height="13px" width="13px">
                    </button>
                    <button type="button" class="result-icon-button" title="Cancel changes"
                        [disabled]="isApplyingEdits" (click)="cancelEditing()">
                        <img src="icons/close.png" height="13px" width="13px">
                    </button>
                    <button type="button" class="result-icon-button danger" title="Preview row delete"
                        [disabled]="getSelectedRowCount() === 0 || isApplyingEdits"
                        (click)="markSelectedRowsForDelete()">
                        <img src="icons/delete.png" height="13px" width="13px">
                    </button>
                    <small *ngIf="hasPendingChanges()">{{ getPendingChangeCount() }} pending</small>
                </ng-container>
            </div>

            <small class="edit-message" *ngIf="isSelectResult && !editingEnabled && editCapabilityMessage">
                {{ editCapabilityMessage }}
            </small>
            <small class="edit-message error" *ngIf="editErrorMessage">
                {{ editErrorMessage }}
            </small>
            <small class="edit-message error" *ngIf="copyErrorMessage">
                {{ copyErrorMessage }}
            </small>

            <button type="button" class="toggle-result-size"
                [attr.aria-label]="isExpanded ? 'Restore results' : 'Expand results'"
                [title]="isExpanded ? 'Restore results' : 'Expand results'" (click)="toggleResultSize()">
                <img [src]="isExpanded ? 'icons/minimize.png' : 'icons/maximize.png'" height="12px" width="12px">
            </button>
            <button type="button" class="close-result" aria-label="Close results" title="Close results"
                (click)="close()">x</button>
        </div>
    </div>
    <div class="result-body">
        <ag-grid-angular *ngIf="!errorMessage" #agGrid class="ag-root" [rowData]="displayRows" [columnDefs]="columnDefs"
            [defaultColDef]="defaultColDef" [domLayout]="'normal'" [rowBuffer]="20"
            [suppressRowVirtualisation]="false" [suppressColumnVirtualisation]="false" [suppressNoRowsOverlay]="true"
            [animateRows]="false" [rowClassRules]="rowClassRules" (firstDataRendered)="query"
            (bodyScroll)="onBodyScroll($event)" (cellMouseDown)="onGridCellMouseDown($event)"
            (cellMouseOver)="onGridCellMouseOver($event)" (cellContextMenu)="onGridCellContextMenu($event)">
        </ag-grid-angular>

        <div class="cell-selection-menu" *ngIf="cellSelectionMenu" [style.left.px]="cellSelectionMenu.x"
            [style.top.px]="cellSelectionMenu.y" (click)="$event.stopPropagation()"
            (contextmenu)="$event.preventDefault()">
            <button type="button" (click)="copySelectedData()">Copiar dados</button>
            <button type="button" (click)="copySelectedTable()">Copiar para tabela</button>
            <button type="button" (click)="exportSelectedXlsx()">Exportar para XLSX</button>
        </div>

        <div class="query-status loading" *ngIf="isLoading || isLoadingMore || isApplyingEdits">
            <span class="query-spinner"></span>
            <span>{{ isApplyingEdits ? 'Applying changes...' : (isLoadingMore ? 'Loading rows...' : 'Executing query...') }}</span>
        </div>

        <div class="query-status error" *ngIf="errorMessage">
            <strong>Query error</strong>
            <span>{{ errorMessage }}</span>
        </div>

        <div class="query-status empty"
            *ngIf="!isLoading && !isLoadingMore && !errorMessage && displayRows.length === 0">
            <span>No rows returned.</span>
        </div>
    </div>
</div>
