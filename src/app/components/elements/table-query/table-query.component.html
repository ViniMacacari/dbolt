<div #tableWrapper class="query-result-wrapper">
    <div class="result-bar">
        <div class="resize-handle" *ngIf="showResultResize" [title]="t('results.resize')" (mousedown)="startResize($event)"></div>
        <div class="result-actions">
            <div class="result-title">
                <span>{{ getResultTitle() }}</span>
                <small *ngIf="isSelectResult">{{ getRowsSummary() }}</small>
                <small *ngIf="getExecutionTimeSummary()">{{ getExecutionTimeSummary() }}</small>
            </div>

            <div class="row-limit" *ngIf="isSelectResult && !editingEnabled">
                <label for="query-row-limit">{{ t('results.maxRows') }}</label>
                <input id="query-row-limit" type="number" min="1" step="1" [value]="rowLimit"
                    (input)="onRowLimitInput($event)" (keydown.enter)="applyRowLimit()">
                <button type="button" (click)="applyRowLimit()">{{ t('results.apply') }}</button>
            </div>

            <button type="button" class="result-icon-button" *ngIf="isSelectResult && !editingEnabled"
                [disabled]="isLoading || isLoadingMore" [attr.aria-label]="t('results.reload')"
                [title]="t('results.reload')" (click)="reloadRows()">
                <img src="icons/refresh.png" height="13px" width="13px">
            </button>

            <button type="button" class="select-all-button" *ngIf="canSelectAllLoadedRows"
                [title]="t('results.selectAllLoadedRows')" (click)="selectAllRows()">
                <img src="icons/table.png" height="13px" width="13px">
                {{ t('results.selectAll') }}
            </button>

            <button type="button" class="result-icon-button export-result-button" *ngIf="canExportQueryResult()"
                [attr.aria-label]="t('results.exportResult')" [title]="t('results.exportResult')"
                (click)="openExportModal()">
                <img src="icons/export.png" height="13px" width="13px">
            </button>

            <div class="edit-actions" *ngIf="isSelectResult">
                <button type="button" class="result-icon-button" [title]="t('results.editRows')" *ngIf="!editingEnabled"
                    [disabled]="!canStartEditing()" (click)="startEditing()">
                    <img src="icons/edit.png" height="13px" width="13px">
                </button>

                <ng-container *ngIf="editingEnabled">
                    <button type="button" class="result-icon-button" [title]="t('results.addRow')"
                        [disabled]="isApplyingEdits" (click)="addRow()">
                        <img src="icons/add.png" height="13px" width="13px">
                    </button>
                    <button type="button" class="result-icon-button" [title]="t('results.applyChanges')"
                        [disabled]="!hasPendingChanges() || isApplyingEdits" (click)="applyPendingChanges()">
                        <img src="icons/save.png" height="13px" width="13px">
                    </button>
                    <button type="button" class="result-icon-button" [title]="t('results.cancelChanges')"
                        [disabled]="isApplyingEdits" (click)="cancelEditing()">
                        <img src="icons/close.png" height="13px" width="13px">
                    </button>
                    <button type="button" class="result-icon-button danger" [title]="t('results.previewRowDelete')"
                        [disabled]="getSelectedRowCount() === 0 || isApplyingEdits"
                        (click)="markSelectedRowsForDelete()">
                        <img src="icons/delete.png" height="13px" width="13px">
                    </button>
                    <small *ngIf="hasPendingChanges()">{{ getPendingChangesSummary() }}</small>
                </ng-container>
            </div>

            <small class="edit-message" *ngIf="isSelectResult && !editingEnabled && editCapabilityMessage">
                {{ editCapabilityMessage }}
            </small>
            <small class="edit-message error" *ngIf="editErrorMessage">
                {{ editErrorMessage }}
            </small>
            <small class="edit-message error" *ngIf="copyErrorMessage">
                {{ copyErrorMessage }}
            </small>

            <button type="button" class="toggle-result-size" *ngIf="showResultExpand"
                [attr.aria-label]="getToggleResultTitle()"
                [title]="getToggleResultTitle()" (click)="toggleResultSize()">
                <img [src]="isExpanded ? 'icons/minimize.png' : 'icons/maximize.png'" height="12px" width="12px">
            </button>
            <button type="button" class="close-result" *ngIf="showResultClose"
                [attr.aria-label]="t('results.close')" [title]="t('results.close')" (click)="close()">x</button>
        </div>
    </div>
    <div class="result-body">
        <ng-container *ngIf="!errorMessage">
            <ag-grid-angular *ngIf="useInfiniteRowModel; else clientSideGrid" #agGrid class="ag-root"
                [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [domLayout]="'normal'"
                [enableBrowserTooltips]="true"
                [rowModelType]="'infinite'" [datasource]="gridDataSource"
                [cacheBlockSize]="infiniteCacheBlockSize" [maxBlocksInCache]="infiniteMaxBlocksInCache"
                [maxConcurrentDatasourceRequests]="1" [blockLoadDebounceMillis]="infiniteBlockLoadDebounceMillis"
                [rowHeight]="resultRowHeight" [headerHeight]="resultHeaderHeight"
                [rowBuffer]="20" [suppressRowVirtualisation]="false" [suppressColumnVirtualisation]="false"
                [suppressNoRowsOverlay]="true" [animateRows]="false" [rowClassRules]="rowClassRules"
                (firstDataRendered)="query" (bodyScroll)="onBodyScroll($event)" (filterChanged)="onGridFilterChanged()"
                (columnHeaderClicked)="onColumnHeaderClicked($event)"
                (cellMouseDown)="onGridCellMouseDown($event)" (cellMouseOver)="onGridCellMouseOver($event)"
                (cellContextMenu)="onGridCellContextMenu($event)">
            </ag-grid-angular>

            <ng-template #clientSideGrid>
                <ag-grid-angular #agGrid class="ag-root" [rowData]="displayRows" [columnDefs]="columnDefs"
                    [defaultColDef]="defaultColDef" [domLayout]="'normal'" [rowBuffer]="20"
                    [enableBrowserTooltips]="true"
                    [rowHeight]="resultRowHeight" [headerHeight]="resultHeaderHeight"
                    [suppressRowVirtualisation]="false" [suppressColumnVirtualisation]="false"
                    [suppressNoRowsOverlay]="true" [animateRows]="false" [rowClassRules]="rowClassRules"
                    (firstDataRendered)="query" (bodyScroll)="onBodyScroll($event)" (filterChanged)="onGridFilterChanged()"
                    (columnHeaderClicked)="onColumnHeaderClicked($event)"
                    (cellMouseDown)="onGridCellMouseDown($event)" (cellMouseOver)="onGridCellMouseOver($event)"
                    (cellContextMenu)="onGridCellContextMenu($event)">
                </ag-grid-angular>
            </ng-template>
        </ng-container>

        <div class="cell-selection-menu" *ngIf="cellSelectionMenu" [style.left.px]="cellSelectionMenu.x"
            [style.top.px]="cellSelectionMenu.y" (click)="$event.stopPropagation()"
            (contextmenu)="$event.preventDefault()">
            <button type="button" (click)="copySelectedData()">{{ t('results.copy') }}</button>
            <button type="button" (click)="copySelectedTable()">{{ t('results.copyToTable') }}</button>
            <button type="button" (click)="exportSelectedXlsx()">{{ t('results.exportXlsx') }}</button>
            <button type="button" (click)="exportSelectedCsv()">{{ t('results.exportCsv') }}</button>
        </div>

        <div class="query-status loading" *ngIf="isLoading || isLoadingMore || isApplyingEdits">
            <span class="query-spinner"></span>
            <span>{{ getLoadingStatus() }}</span>
        </div>

        <div class="query-status error" *ngIf="errorMessage">
            <div class="query-error-header">
                <strong>{{ t('results.queryError') }}</strong>
                <button type="button" (click)="copyQueryError($event)">{{ t('results.copy') }}</button>
            </div>
            <span class="query-error-message">{{ errorMessage }}</span>
        </div>

        <div class="query-status empty"
            *ngIf="!isLoading && !isLoadingMore && !errorMessage && displayRows.length === 0">
            <span>{{ t('results.noRowsReturned') }}</span>
        </div>
    </div>
</div>

<app-export-query *ngIf="showExportModal" [sql]="executedSql" [dbContext]="dbContext"
    [availableColumns]="getExportableColumns()" [totalRows]="totalRows"
    (close)="closeExportModal()">
</app-export-query>
