<div #tableWrapper class="table-wrapper">
    <ag-grid-angular #agGrid class="ag-root" [rowData]="query" [columnDefs]="columnDefs" [defaultColDef]="defaultColDef"
        [domLayout]="'normal'" [animateRows]="true" (gridReady)="onGridReady($event)"
        (filterChanged)="onGridStateChanged()" (sortChanged)="onGridStateChanged()"
        (columnMoved)="onGridStateChanged()" (columnResized)="onGridStateChanged()"
        (columnVisible)="onGridStateChanged()" (columnPinned)="onGridStateChanged()"
        (firstDataRendered)="query" (bodyScroll)="onBodyScroll($event)">
    </ag-grid-angular>
</div>
