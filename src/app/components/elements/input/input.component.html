<input class="input-page" [id]="id || null" [name]="name || null" [type]="type" [value]="value ?? ''"
    [placeholder]="placeholder" [attr.min]="min" [attr.max]="max" [attr.step]="step"
    [attr.maxlength]="maxlength" [attr.autocomplete]="autocomplete" [readonly]="readonly" [disabled]="isDisabled"
    [attr.aria-label]="ariaLabel || null" [attr.aria-describedby]="ariaDescribedBy || null"
    (input)="handleInput($event)" (blur)="handleBlur($event)">
