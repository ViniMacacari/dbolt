<div class="code-editor-container table-info-container d-flex h-100 gap-2">
    <div class="editor-toolbar d-flex h-100 align-items-center flex-column">
        <button class="btn" [ngClass]="{ 'active': activeView === 'data' }" (click)="filterData()">
            <img src="icons/table.png" [title]="t('tableInfo.data')" height="15px">
            {{ t('tableInfo.data') }}
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': activeView === 'columns' }" (click)="filterColumns()">
            <img src="icons/column.png" [title]="t('tableInfo.columns')" height="15px">
            {{ t('tableInfo.columns') }}
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': activeView === 'keys' }" (click)="filterKeys()">
            <img src="icons/key.png" [title]="t('tableInfo.keys')" height="15px">
            {{ t('tableInfo.keys') }}
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': activeView === 'indexes' }" (click)="filterIndexes()">
            <img src="icons/index.png" [title]="t('tableInfo.indexes')" height="15px">
            {{ t('tableInfo.indexes') }}
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': activeView === 'ddl' }" (click)="filterDDL()">
            <img src="icons/code.png" [title]="t('tableInfo.ddl')" height="15px">
            {{ t('tableInfo.ddl') }}
        </button>

        <div class="separator"></div>

        <button class="btn" (click)="openDiagram()">
            <img src="icons/diagram.png" [title]="t('diagram.title')" height="15px">
            {{ t('diagram.title') }}
        </button>
    </div>

    <div class="info table-info-panel">
        <div *ngIf="showData" class="data-panel">
            <app-table-query [query]="dataRows" [columns]="dataColumns" [rowLimit]="dataFetchSize"
                [totalRows]="dataTotalRows" [isSelectResult]="true" [executedSql]="dataErrorMessage ? '' : getTableDataSql()"
                [dbContext]="tabInfo?.dbInfo || data" [resultHeight]="dataResultHeight" [isExpanded]="true"
                [isLoading]="isLoadingData" [isLoadingMore]="isLoadingMoreData" [errorMessage]="dataErrorMessage"
                [executionTimeMs]="dataExecutionTimeMs" [resultTitle]="t('tableInfo.data')" [showResultResize]="false"
                [showResultExpand]="false" [showResultClose]="false" [emitFilterModelChanges]="true"
                [filterOnApplyOnly]="true" (filterModelChange)="onDataFilterModelChange($event)"
                (rowLimitChange)="onDataFetchSizeChange($event)"
                (refreshQuery)="refreshTableDataWithFetchSize()" (newValuesQuery)="loadMoreTableData()"
                (resultHeightChange)="onDataResultHeightChange($event)">
            </app-table-query>
        </div>

        <div *ngIf="!showData && !showDDL" class="metadata-panel">
            <p class="metadata-status" *ngIf="isLoadingMetadata">{{ t('tableInfo.loadingMetadata') }}</p>
            <p class="metadata-status error" *ngIf="metadataError">{{ metadataError }}</p>

            <div #metadataGridWrapper class="metadata-grid-wrapper" *ngIf="!isLoadingMetadata && !metadataError">
                <ag-grid-angular class="metadata-grid" [style.height]="metadataGridHeight" [rowData]="activeRows"
                    [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [domLayout]="'normal'" [rowBuffer]="30"
                    [suppressRowVirtualisation]="false" [suppressColumnVirtualisation]="false" [animateRows]="false"
                    (gridReady)="onGridReady($event)" (filterChanged)="onMetadataGridStateChanged()"
                    (sortChanged)="onMetadataGridStateChanged()" (columnMoved)="onMetadataGridStateChanged()"
                    (columnResized)="onMetadataGridStateChanged()" (columnVisible)="onMetadataGridStateChanged()"
                    (columnPinned)="onMetadataGridStateChanged()">
                </ag-grid-angular>
            </div>

            <p class="metadata-status" *ngIf="!isLoadingMetadata && !metadataError && activeRows.length === 0">
                {{ t('tableInfo.noMetadataFound') }}
            </p>
        </div>

        <div *ngIf="showDDL" class="ddl-panel">
            <p class="metadata-status" *ngIf="isLoadingMetadata">{{ t('tableInfo.loadingDdl') }}</p>
            <p class="metadata-status error" *ngIf="metadataError">{{ metadataError }}</p>
            <pre *ngIf="!isLoadingMetadata && !metadataError">{{ ddl || t('tableInfo.noDdlAvailable') }}</pre>
        </div>
    </div>
</div>

<app-toast></app-toast>
