<div class="code-editor-container db-info-container d-flex h-100 gap-2">
    <div class="editor-toolbar d-flex align-items-center flex-column">
        <button class="btn" [ngClass]="{ 'active': showTables }" (click)="filterTables()">
            <img src="icons/table.png" title="Tables" height="15px">
            Tables <small>{{ data?.tables?.length || 0 }}</small>
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': showViews }" (click)="filterViews()">
            <img src="icons/view.png" title="Views" height="15px">
            Views <small>{{ data?.views?.length || 0 }}</small>
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': showProcedures }" (click)="filterProcedures()">
            <img src="icons/procedure.png" title="Procedures" height="15px">
            Procedures <small>{{ data?.procedures?.length || 0 }}</small>
        </button>

        <div class="separator"></div>

        <button class="btn" [ngClass]="{ 'active': showIndexes }" (click)="filterIndexes()">
            <img src="icons/index.png" title="Indexes" height="15px">
            Indexes <small>{{ data?.indexes?.length || 0 }}</small>
        </button>
    </div>

    <div class="info db-info-panel">
        <div #gridWrapper class="db-info-grid-wrapper">
            <ag-grid-angular class="db-info-grid" [style.height]="gridHeight" [rowData]="activeRows" [columnDefs]="columnDefs"
                [defaultColDef]="defaultColDef" [domLayout]="'normal'" [rowBuffer]="30"
                [suppressRowVirtualisation]="false" [suppressColumnVirtualisation]="false" [animateRows]="false"
                (gridReady)="onGridReady($event)" (rowClicked)="onRowClicked($event)">
            </ag-grid-angular>
        </div>

        <p class="empty-list" *ngIf="activeRows.length === 0">{{ emptyMessage }}</p>
    </div>
</div>

<app-toast></app-toast>
