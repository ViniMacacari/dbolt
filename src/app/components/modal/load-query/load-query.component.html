<div class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="title text-center w-100">Load a query file</h5>
        </div>
        <div class="modal-body">
            <div class="d-flex w-100 gap-3">
                <input [(ngModel)]="queryName" type="text" class="input-page"
                    placeholder="Search your query" (ngModelChange)="validateQueryName($event)" />
                <app-input-list #database [list]="dataList" [displayKey]="'name'" [width]="'211.2px'"
                    (itemSelected)="onDatabaseSelected($event)"
                    [placeholder]="'Choose the database type'"></app-input-list>
            </div>
            <input [(ngModel)]="folderPath" type="text" class="input-page folder-filter"
                placeholder="Filter by folder" list="load-query-folders"
                (ngModelChange)="onFolderPathChanged($event)" />
            <datalist id="load-query-folders">
                <option *ngFor="let folder of folders" [value]="folder"></option>
            </datalist>

            <div class="queries">
                <div class="query-item" *ngFor="let query of queries">
                    <div class="query-main" (click)="loadQuery(query)">
                        <img src="db-logo/{{ query.dbSchema?.sgbd }}.png" height="18px">
                        <span>
                            <h2 class="subtitle">{{ query.name }}</h2>
                            <small *ngIf="query.folderPath">{{ formatQueryPath(query) }}</small>
                            <small *ngIf="query.updatedAt">Updated: {{ formatDate(query.updatedAt) }}</small>
                        </span>
                    </div>
                    <button class="history-button" *ngIf="query.versioningEnabled || (query.versions?.length || 0) > 0"
                        (click)="toggleHistory(query, $event)">
                        History
                    </button>
                    <img src="icons/delete.png" height="15px" (click)="deleteQuery(query)">

                    <div class="version-list" *ngIf="expandedHistoryQueryId === query.id">
                        <button type="button" *ngFor="let version of getQueryVersions(query)"
                            (click)="restoreVersion(query, version, $event)">
                            Restore {{ formatDate(version.changedAt) }}
                        </button>
                        <small *ngIf="getQueryVersions(query).length === 0">No saved versions yet</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" (click)="onClose()">Cancel</button>
        </div>
    </div>
</div>

<app-toast></app-toast>
