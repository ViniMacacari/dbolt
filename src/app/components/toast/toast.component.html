<div class="app-toast-container" aria-live="polite" aria-atomic="true">
    <div *ngFor="let toast of toasts" class="app-toast" role="status" [style.--toast-color]="toast.color">
        <span class="app-toast-accent" aria-hidden="true"></span>
        <p class="app-toast-message">{{ toast.message }}</p>
        <button type="button" class="app-toast-close" aria-label="Close" (click)="removeToast(toast)">
            &times;
        </button>
    </div>
</div>
