<aside class="sidebar ai-assistant-sidebar">
    <div class="sidebar-actions my-2">
        <button type="button" class="sidebar-action-button menu-button" (click)="close.emit()"
            [title]="t('generic.back')">
            <img src="icons/close.png" height="24px" class="toogle-img" [alt]="t('generic.back')">
        </button>
        <button type="button" class="sidebar-action-button home-button" (click)="errorMessage = ''"
            [title]="t('aiAssistant.chat')">
            <img src="icons/chat.png" height="17px" width="17px" [alt]="t('aiAssistant.chat')">
        </button>
        <button type="button" class="sidebar-action-button settings-button" (click)="settingsRequested.emit()"
            [title]="t('aiAssistant.configure')">
            <img src="icons/settings.png" height="17px" width="17px" [alt]="t('aiAssistant.configure')">
        </button>
    </div>
    <div class="py-2"></div>

    <p class="selected-title">{{ t('aiAssistant.title') }}</p>
    <button type="button" class="sgbd" (click)="settingsRequested.emit()">
        <img src="icons/ai.png" height="15px" width="15px" [alt]="t('aiAssistant.assistant')">
        <p class="text-min w-100">{{ settings?.model || t('aiAssistant.configure') }}</p>
    </button>
    <button type="button" class="database context-summary" [disabled]="!databaseContextAvailable">
        <img src="icons/database.png" height="15px" width="15px">
        <p class="text-min w-100">{{ contextDatabaseLabel }}</p>
    </button>
    <button type="button" class="schema context-summary" [disabled]="!databaseContextAvailable">
        <img src="icons/schema.png" height="15px" width="15px">
        <p class="text-min w-100">{{ contextSchemaLabel }}</p>
    </button>

    <div class="separator my-3"></div>

    <div class="conversation-section">
        <div class="conversation-header">
            <span>{{ t('aiAssistant.conversations') }}</span>
            <button type="button" class="conversation-icon-button" (click)="startNewConversation()"
                [disabled]="sending || loadingConversations" [title]="t('aiAssistant.newConversation')">
                <img src="icons/add.png" height="13px" width="13px" [alt]="t('aiAssistant.newConversation')">
            </button>
        </div>

        <div class="conversation-tabs" *ngIf="!loadingConversations">
            <div class="conversation-tab" *ngFor="let conversation of conversations; trackBy: trackConversation"
                [class.active]="conversation.id === activeConversationId">
                <button type="button" class="conversation-select" (click)="selectConversation(conversation)"
                    [disabled]="sending" [title]="getConversationTitle(conversation)">
                    <span>{{ getConversationTitle(conversation) }}</span>
                </button>
                <button type="button" class="conversation-delete" (click)="requestDeleteConversation(conversation, $event)"
                    [disabled]="sending" [title]="t('aiAssistant.deleteConversation')">
                    <img src="icons/delete.png" height="12px" width="12px" [alt]="t('aiAssistant.deleteConversation')">
                </button>
            </div>
        </div>

        <p class="conversation-loading text-min-gray" *ngIf="loadingConversations">
            {{ t('aiAssistant.loadingConversations') }}
        </p>
    </div>

    <div class="separator my-3"></div>

    <div class="connection ai-status" *ngIf="errorMessage">
        {{ errorMessage }}
    </div>

    <div class="connection ai-config-needed" *ngIf="!loadingSettings && !settings?.hasApiKey">
        <p>{{ t('aiAssistant.settingsRequired') }}</p>
        <button type="button" (click)="settingsRequested.emit()">{{ t('aiAssistant.openSettings') }}</button>
    </div>

    <div class="connections ai-chat" #messagesContainer>
        <div class="connection ai-empty" *ngIf="messages.length === 0">
            <img src="icons/ai.png" [alt]="t('aiAssistant.assistant')">
            <p class="text-min-gray">{{ t('aiAssistant.emptyState') }}</p>
        </div>

        <div #messageItem *ngFor="let message of messages; trackBy: trackMessage">
            <app-ai-chat-message [message]="message">
            </app-ai-chat-message>
        </div>

        <div class="connection typing text-min-gray" *ngIf="sending">
            {{ t('aiAssistant.answering') }}
        </div>
    </div>

    <app-ai-chat-input [disabled]="sending || !canChat || loadingConversations"
        [databaseContextAvailable]="databaseContextAvailable" (send)="onSend($event)">
    </app-ai-chat-input>

    <app-yes-no-modal *ngIf="showDeleteConversationConfirm" [title]="t('aiAssistant.deleteConversation')"
        [message]="deleteConversationConfirmMessage" [cancelLabel]="t('aiAssistant.no')"
        [continueLabel]="t('aiAssistant.yesDelete')" (closeAction)="cancelDeleteConversation()"
        (continueAction)="confirmDeleteConversation()">
    </app-yes-no-modal>
</aside>
